<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7天减脂食谱 | 采购&打卡管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#22c55e',
                        secondary: '#f0fdf4',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .tab-active { @apply bg-primary text-white; }
        .tab-normal { @apply bg-gray-100 hover:bg-gray-200; }
        .card { @apply bg-white rounded-xl shadow-md p-4 mb-4; }
        .progress-bar { @apply h-2 rounded-full bg-gray-200 overflow-hidden; }
        .progress-fill { @apply h-full bg-primary transition-all duration-500; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">
    <div class="container mx-auto px-3 py-5 max-w-2xl">
        <h1 class="text-[22px] font-bold text-center text-gray-800 mb-6">7天减脂食谱 交互管理</h1>

        <!-- Tab 切换 -->
        <div class="flex rounded-lg overflow-hidden mb-6">
            <button id="tab1" class="flex-1 py-3 tab-active font-medium" onclick="switchTab(1)">
                <i class="fa fa-shopping-cart mr-1"></i> 采购&备餐
            </button>
            <button id="tab2" class="flex-1 py-3 tab-normal font-medium" onclick="switchTab(2)">
                <i class="fa fa-calendar-check-o mr-1"></i> 每日食谱&打卡
            </button>
        </div>

        <!-- 页面1: 采购&备餐 -->
        <div id="page1" class="page">
            <!-- 采购清单 -->
            <div class="card">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-bold text-lg"><i class="fa fa-list-ul text-primary mr-1"></i> 采购清单</h2>
                    <span id="buyPercent" class="text-primary font-medium">0%</span>
                </div>
                <div class="progress-bar mb-3">
                    <div id="buyProgress" class="progress-fill" style="width:0%"></div>
                </div>
                <div id="buyList" class="space-y-2"></div>
            </div>

            <!-- 备餐准备 -->
            <div class="card">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-bold text-lg"><i class="fa fa-cogs text-primary mr-1"></i> 备餐准备</h2>
                    <span id="prepPercent" class="text-primary font-medium">0%</span>
                </div>
                <div class="progress-bar mb-3">
                    <div id="prepProgress" class="progress-fill" style="width:0%"></div>
                </div>
                <div id="prepList" class="space-y-2"></div>
            </div>
        </div>

        <!-- 页面2: 每日食谱&打卡 -->
        <div id="page2" class="page hidden">
            <!-- 天数选择 -->
            <div class="grid grid-cols-7 gap-1 mb-4">
                <button onclick="switchDay(1)" class="day-btn py-2 rounded bg-primary text-white text-sm">D1</button>
                <button onclick="switchDay(2)" class="day-btn py-2 rounded bg-gray-100 text-sm">D2</button>
                <button onclick="switchDay(3)" class="day-btn py-2 rounded bg-gray-100 text-sm">D3</button>
                <button onclick="switchDay(4)" class="day-btn py-2 rounded bg-gray-100 text-sm">D4</button>
                <button onclick="switchDay(5)" class="day-btn py-2 rounded bg-gray-100 text-sm">D5</button>
                <button onclick="switchDay(6)" class="day-btn py-2 rounded bg-gray-100 text-sm">D6</button>
                <button onclick="switchDay(7)" class="day-btn py-2 rounded bg-gray-100 text-sm">D7</button>
            </div>

            <!-- 当日食谱 -->
            <div class="card">
                <h3 id="dayTitle" class="font-bold text-lg mb-3">第1天 食谱</h3>
                <div id="dayDiet" class="space-y-3"></div>
            </div>

            <!-- 当日执行记录 -->
            <div class="card mt-4">
                <h3 class="font-bold text-lg mb-3"><i class="fa fa-pencil text-primary mr-1"></i> 当日执行记录</h3>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">体重（斤）</label>
                    <input type="number" id="dayWeight" step="0.01" min="0" class="w-full border rounded-lg px-3 py-2 outline-primary" placeholder="例如：120.50">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">运动</label>
                    <input type="text" id="dayExercise" class="w-full border rounded-lg px-3 py-2 outline-primary" placeholder="记录今天的运动内容，如：跑步30分钟">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">备注记录</label>
                    <textarea id="dayRemark" rows="3" class="w-full border rounded-lg px-3 py-2 outline-primary" placeholder="记录饮食感受、调整事项..."></textarea>
                </div>
                <button onclick="saveDayRecord()" class="w-full bg-primary text-white py-2 rounded-lg font-medium">
                    <i class="fa fa-save mr-1"></i> 保存记录
                </button>
            </div>
        </div>
    </div>

    <script>
        // 采购清单数据
        const buyListData = [
            {name:'全麦吐司', unit:'1小袋'},
            {name:'红薯', unit:'300g'},
            {name:'甜玉米', unit:'2根'},
            {name:'牛排', unit:'400g'},
            {name:'鸡胸肉', unit:'700g'},
            {name:'三文鱼', unit:'300g'},
            {name:'去皮鸡腿', unit:'1个'},
            {name:'瘦羊肉片', unit:'200g'},
            {name:'鸡蛋', unit:'10个'},
            {name:'无糖希腊酸奶', unit:'400g'},
            {name:'原味杏仁', unit:'100g'},
            {name:'球生菜', unit:'1大颗'},
            {name:'菠菜', unit:'200g'},
            {name:'西兰花', unit:'300g'},
            {name:'西红柿', unit:'3个'},
            {name:'胡萝卜', unit:'2根'},
            {name:'芹菜', unit:'1把'},
            {name:'黄瓜', unit:'2根'},
            {name:'苹果', unit:'3个'},
            {name:'橙子', unit:'2个'},
            {name:'柠檬', unit:'2个'},
            {name:'黑咖啡/绿茶', unit:'按需'},
            {name:'橄榄油', unit:'小瓶装'}
        ];

        // 备餐准备数据
        const prepListData = [
            {name:'肉类按份分装冷冻'},
            {name:'提前煮好备用鸡蛋'},
            {name:'蔬菜清洗分装保鲜'},
            {name:'鸡胸肉提前腌制'},
            {name:'备好沙拉调味调料'},
            {name:'准备每日喝水水杯'}
        ];

        // 7天食谱数据
        const dietData = [
            {
                title:'第1天 食谱',
                list:[
                    '早餐：无糖黑咖啡/淡绿茶 + 1片全麦吐司 + 1个水煮蛋',
                    '中餐：2个水煮蛋 + 1个西红柿 + 水煮菠菜 + 50g熟红薯',
                    '晚餐：200g牛排 + 生菜黄瓜沙拉',
                    '加餐：10颗原味杏仁'
                ]
            },
            {
                title:'第2天 食谱',
                list:[
                    '早餐：无糖希腊酸奶150g + 半个苹果',
                    '中餐：200g水煮鸡胸肉 + 100g熟玉米 + 生菜沙拉',
                    '晚餐：150g香煎三文鱼 + 清炒西兰花',
                    '加餐：1小盒无糖豆浆'
                ]
            },
            {
                title:'第3天 食谱',
                list:[
                    '早餐：淡绿茶 + 1片全麦吐司 + 1个水煮蛋',
                    '中餐：150g煎鸡胸肉 + 生菜番茄沙拉 + 50g熟红薯',
                    '晚餐：水煮芹菜段 + 1个西红柿 + 1个苹果',
                    '加餐：1根小黄瓜'
                ]
            },
            {
                title:'第4天 食谱',
                list:[
                    '早餐：无糖黑咖啡/淡绿茶 + 1个橙子',
                    '中餐：2个水煮蛋 + 清炒胡萝卜丝 + 100g熟玉米',
                    '晚餐：150g水煮鸡胸肉 + 生菜沙拉 + 无糖希腊酸奶',
                    '加餐：少量蓝莓'
                ]
            },
            {
                title:'第5天 食谱',
                list:[
                    '早餐：淡绿茶 + 1个水煮蛋',
                    '中餐：150g香煎三文鱼 + 生菜黄瓜沙拉 + 50g熟红薯',
                    '晚餐：200g牛排 + 清炒西兰花',
                    '加餐：10颗原味杏仁'
                ]
            },
            {
                title:'第6天 食谱',
                list:[
                    '早餐：无糖黑咖啡/淡绿茶 + 1片全麦吐司',
                    '中餐：2个水煮蛋 + 清炒胡萝卜丝 + 不限量生菜',
                    '晚餐：200g去皮烤鸡腿 + 生菜柠檬沙拉',
                    '加餐：1个小番茄'
                ]
            },
            {
                title:'第7天 食谱',
                list:[
                    '早餐：淡绿茶（无糖）',
                    '中餐：150g水煮鸡胸肉 + 生菜黄瓜沙拉',
                    '晚餐：200g瘦羊肉片 + 1个苹果',
                    '加餐：1盒无糖希腊酸奶'
                ]
            }
        ];

        // 本地存储
        let store = JSON.parse(localStorage.getItem('dietStore')) || {
            buy: [],
            prep: [],
            dayRecord: [{},{},{},{},{},{},{}]
        };
        let currentDay = 1;

        // 初始化存储数据
        if (store.buy.length !== buyListData.length) {
            store.buy = Array(buyListData.length).fill(false);
        }
        if (store.prep.length !== prepListData.length) {
            store.prep = Array(prepListData.length).fill(false);
        }

        // Tab 切换
        function switchTab(num) {
            document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
            document.getElementById('page' + num).classList.remove('hidden');
            document.querySelectorAll('[id^="tab"]').forEach(el => {
                el.className = 'flex-1 py-3 tab-normal font-medium';
            });
            document.getElementById('tab' + num).className = 'flex-1 py-3 tab-active font-medium';
        }

        // 渲染采购清单
        function renderBuyList() {
            const wrap = document.getElementById('buyList');
            wrap.innerHTML = '';
            buyListData.forEach((item, idx) => {
                const chk = store.buy[idx] ? 'checked' : '';
                wrap.innerHTML += `
                <div class="flex items-center justify-between">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" ${chk} onchange="toggleBuy(${idx})" class="w-4 h-4 text-primary accent-primary">
                        <span class="ml-2 ${store.buy[idx] ? 'line-through text-gray-400' : ''}">${item.name}</span>
                    </label>
                    <span class="text-sm text-gray-500">${item.unit}</span>
                </div>`;
            });
            calcBuyProgress();
        }

        // 渲染备餐清单
        function renderPrepList() {
            const wrap = document.getElementById('prepList');
            wrap.innerHTML = '';
            prepListData.forEach((item, idx) => {
                const chk = store.prep[idx] ? 'checked' : '';
                wrap.innerHTML += `
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" ${chk} onchange="togglePrep(${idx})" class="w-4 h-4 text-primary accent-primary">
                    <span class="ml-2 ${store.prep[idx] ? 'line-through text-gray-400' : ''}">${item.name}</span>
                </label>`;
            });
            calcPrepProgress();
        }

        // 切换采购项状态
        function toggleBuy(idx) {
            store.buy[idx] = !store.buy[idx];
            saveStore();
            renderBuyList();
        }

        // 切换备餐项状态
        function togglePrep(idx) {
            store.prep[idx] = !store.prep[idx];
            saveStore();
            renderPrepList();
        }

        // 计算采购进度
        function calcBuyProgress() {
            const total = buyListData.length;
            const done = store.buy.filter(Boolean).length;
            const pct = Math.round(done / total * 100);
            document.getElementById('buyProgress').style.width = pct + '%';
            document.getElementById('buyPercent').innerText = pct + '%';
        }

        // 计算备餐进度
        function calcPrepProgress() {
            const total = prepListData.length;
            const done = store.prep.filter(Boolean).length;
            const pct = Math.round(done / total * 100);
            document.getElementById('prepProgress').style.width = pct + '%';
            document.getElementById('prepPercent').innerText = pct + '%';
        }

        // 切换天数
        function switchDay(day) {
            currentDay = day;
            document.querySelectorAll('.day-btn').forEach((el, i) => {
                el.className = i + 1 === day
                    ? 'day-btn py-2 rounded bg-primary text-white text-sm'
                    : 'day-btn py-2 rounded bg-gray-100 text-sm';
            });
            const diet = dietData[day - 1];
            document.getElementById('dayTitle').innerText = diet.title;
            const wrap = document.getElementById('dayDiet');
            wrap.innerHTML = '';
            diet.list.forEach(item => {
                wrap.innerHTML += `
                <div class="bg-secondary p-3 rounded-lg text-sm">
                    <i class="fa fa-check-circle text-primary mr-1"></i>${item}
                </div>`;
            });
            loadDayRecord();
        }

        // 加载当日记录
        function loadDayRecord() {
            const rec = store.dayRecord[currentDay - 1] || {};
            document.getElementById('dayWeight').value = rec.weight || '';
            document.getElementById('dayExercise').value = rec.exercise || '';
            document.getElementById('dayRemark').value = rec.remark || '';
        }

        // 保存当日记录
        function saveDayRecord() {
            const weight = document.getElementById('dayWeight').value;
            const exercise = document.getElementById('dayExercise').value;
            const remark = document.getElementById('dayRemark').value;
            store.dayRecord[currentDay - 1] = { weight, exercise, remark };
            saveStore();
            alert('当日记录保存成功！');
        }

        // 保存到本地存储
        function saveStore() {
            localStorage.setItem('dietStore', JSON.stringify(store));
        }

        // 页面加载初始化
        window.onload = function() {
            renderBuyList();
            renderPrepList();
            switchDay(1);
        }
    </script>
</body>
</html>
